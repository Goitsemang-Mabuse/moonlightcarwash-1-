<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <!-- Font Awesome for social media icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <!-- Header with logo and navigation menu -->

    <header>
         <h2>Moonlight Car Wash</h2>
         <!-- Navigation links to all pages -->

         <nav> 
             <a href="index.html">Home</a>
             <a href="about.html">About</a>
             <a href="services.html">Services</a>
             <a href="booking.html">Booking</a>
             <a href="contact.html">Contact</a>
         </nav>
    </header>
 
    <!-- Contact details and message form -->

    <section>
        <h1>Contact Us</h1>
        
        <!-- Phone and email info -->

        <p>Phone: 082 912 2030</p>
        <p>Email: info@moonlightcarwash.com</p>
 
        <!-- Contact form for customer enquiries -->

        <form>
            <label>Name:</label><br>
            <input type="text"><br><br>

            <label>Email:</label><br>
            <input type="email"><br><br>

            <!-- Dropdown for selecting the subject of the enquiry -->

            <label>Subject:</label><br>
            <select>
                <option value="" disabled selected>-- Select a subject --</option>
                <option value="booking">Booking Enquiry</option>
                <option value="pricing">Pricing &amp; Packages</option>
                <option value="mobile">Mobile Wash Request</option>
                <option value="complaint">Complaint</option>
                <option value="feedback">Feedback</option>
                <option value="other">Other</option>
            </select><br><br>

            <label>Message:</label><br>
            <textarea></textarea><br><br>

            <button>Send</button>
        </form>
    </section>
  
    <!-- Footer with contact info, map and social links -->

     <footer>
        <!-- Embedded Google Map -->

        <h2>Our Location</h2>
        <iframe
            src="https://www.google.com/maps?q=Moonlight+Car+Wash+Mabopane&output=embed"width="300"height="200">     
        </iframe>

        <!-- Social media links -->

        <p>Follow Us:</p>
        <a href="https://www.facebook.com" target="_blank"><i class="fa-brands fa-facebook"></i> Facebook</a>
        <a href="https://www.instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram</a>
        <a href="https://www.twitter.com" target="_blank"><i class="fa-brands fa-twitter"></i> Twitter</a>              
    </footer>

</body>
</html>
