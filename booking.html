<!DOCTYPE html>
<html>
<head>
    <title>Booking</title>
    <!-- Font Awesome for social media icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <!-- Header with logo and navigation menu -->

    <header id="header">
    <div class="logo">
        <img src="image/image-logo.png" width="120" alt="logo">
    </div>

         <h2>Moonlight Car Wash</h2>
         <!-- Navigation links to all pages -->
         <nav> 
             <a href="index.html">Home</a>
             <a href="about.html">About</a>
             <a href="services.html">Services</a>
             <a href="booking.html">Booking</a>
             <a href="contact.html">Contact</a>
         </nav>
    </header>

    <!-- Booking form section -->

    <section>
        <h1>Booking Form</h1>

        <!-- Form for customers to book a car wash service -->

        <form>
            <label>Name:</label><br>
            <input type="text"><br><br>

            <label>Phone:</label><br>
            <input type="text"><br><br>

            <!-- Dropdown to select a service -->

            <label>Select Service:</label><br>
            <select>
                <option>Basic Wash</option>
                <option>Valet Service</option>
                <option>Mobile Wash</option>
            </select><br><br>

            <button type="submit">Submit</button>
        </form>
    </section>

    <!-- Footer with copyright -->

    <footer>
        <p>&copy; 2026 Moonlight Car Wash. All rights reserved.</p>
    </footer>

</body>
</html>
